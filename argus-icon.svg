<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     role="img"
     aria-label="Argus">
  <title>Argus — Icon</title>
  <desc>Icon-only mark: watchful eye fused with an omnidirectional beam network. For favicons, app tiles, and hardware badging.</desc>

  <defs>
    <!-- Obsidian square background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0b0c18"/>
      <stop offset="70%"  stop-color="#07070f"/>
      <stop offset="100%" stop-color="#020205"/>
    </radialGradient>

    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22C6FF"/>
      <stop offset="50%"  stop-color="#1E7BFF"/>
      <stop offset="100%" stop-color="#7A3BFF"/>
    </linearGradient>

    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="18%"  stop-color="#EAF6FF"/>
      <stop offset="42%"  stop-color="#22C6FF"/>
      <stop offset="78%"  stop-color="#1E4FFF"/>
      <stop offset="100%" stop-color="#3A0FA0"/>
    </radialGradient>

    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22C6FF" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#22C6FF" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#7A3BFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7A3BFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b1"/>
      <feGaussianBlur stdDeviation="12" in="SourceGraphic" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="nb"/>
      <feMerge>
        <feMergeNode in="nb"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <symbol id="shard" overflow="visible">
      <path d="M 0 -10 L 6 -60 L 0 -170 L -6 -60 Z"
            fill="url(#beam)" opacity="0.9"/>
    </symbol>
  </defs>

  <!-- Rounded-square background (app-icon friendly) -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Faint dust -->
  <g opacity="0.25" fill="#9CC3FF">
    <circle cx="70"  cy="90"  r="1.1"/>
    <circle cx="440" cy="120" r="0.9"/>
    <circle cx="80"  cy="420" r="0.9"/>
    <circle cx="430" cy="430" r="1.1"/>
  </g>

  <g transform="translate(256 256)">

    <!-- Concentric radar rings -->
    <circle cx="0" cy="0" r="175" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.55"/>
    <circle cx="0" cy="0" r="145" fill="none" stroke="url(#ring)" stroke-width="1.1" opacity="0.7"/>
    <circle cx="0" cy="0" r="115" fill="none" stroke="url(#ring)" stroke-width="1.3" opacity="0.85"/>

    <!-- 8 radiating shards -->
    <g filter="url(#bloom)">
      <use href="#shard" transform="rotate(0)"/>
      <use href="#shard" transform="rotate(45)"/>
      <use href="#shard" transform="rotate(90)"/>
      <use href="#shard" transform="rotate(135)"/>
      <use href="#shard" transform="rotate(180)"/>
      <use href="#shard" transform="rotate(225)"/>
      <use href="#shard" transform="rotate(270)"/>
      <use href="#shard" transform="rotate(315)"/>
    </g>

    <!-- Eyelids (almond) -->
    <g fill="none" stroke-linecap="round" filter="url(#bloom)">
      <path d="M -108 0 Q 0 -92 108 0" stroke="url(#beam)" stroke-width="3.2"/>
      <path d="M -108 0 Q 0  92 108 0" stroke="url(#beam)" stroke-width="3.2"/>
    </g>
    <g fill="none" stroke-linecap="round">
      <path d="M -90 0 Q 0 -76 90 0" stroke="#EAF6FF" stroke-width="0.8" opacity="0.45"/>
      <path d="M -90 0 Q 0  76 90 0" stroke="#EAF6FF" stroke-width="0.8" opacity="0.45"/>
    </g>

    <!-- Iris + pupil + catchlight -->
    <g filter="url(#bloom)">
      <circle cx="0" cy="0" r="44" fill="url(#iris)"/>
    </g>
    <circle cx="0" cy="0" r="18" fill="#05060F"/>
    <circle cx="0" cy="0" r="18" fill="url(#iris)" opacity="0.2"/>
    <circle cx="-5" cy="-6" r="3.2" fill="#FFFFFF" opacity="0.9"/>

    <!-- Network nodes -->
    <g filter="url(#nodeGlow)">
      <circle cx="0"    cy="-145" r="4.2" fill="#22C6FF"/>
      <circle cx="145"  cy="0"    r="4.2" fill="#5FA8FF"/>
      <circle cx="0"    cy="145"  r="4.2" fill="#7A3BFF"/>
      <circle cx="-145" cy="0"    r="4.2" fill="#5FA8FF"/>
      <circle cx="103"  cy="-103" r="3.6" fill="#22C6FF"/>
      <circle cx="103"  cy="103"  r="3.6" fill="#7A3BFF"/>
      <circle cx="-103" cy="103"  r="3.6" fill="#7A3BFF"/>
      <circle cx="-103" cy="-103" r="3.6" fill="#22C6FF"/>
    </g>

    <!-- Subtle chord mesh -->
    <g stroke="url(#beam)" stroke-width="0.7" stroke-opacity="0.35" fill="none">
      <line x1="0"    y1="-145" x2="145"  y2="0"/>
      <line x1="145"  y1="0"    x2="0"    y2="145"/>
      <line x1="0"    y1="145"  x2="-145" y2="0"/>
      <line x1="-145" y1="0"    x2="0"    y2="-145"/>
      <line x1="103"  y1="-103" x2="-103" y2="103"/>
      <line x1="-103" y1="-103" x2="103"  y2="103"/>
    </g>

  </g>
</svg>
