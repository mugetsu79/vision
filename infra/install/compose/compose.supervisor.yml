services:
  nats-leaf:
    image: ${VEZOR_NATS_IMAGE:?set VEZOR_NATS_IMAGE}
    container_name: vezor-edge-nats-leaf
    command: ["-js", "-c", "/etc/nats/nats.conf"]
    restart: unless-stopped
    volumes:
      - /etc/vezor/nats/leaf.conf:/etc/nats/nats.conf:ro
      - /var/lib/vezor/nats:/data
    healthcheck:
      test: ["CMD", "/nats-server", "-t", "-c", "/etc/nats/nats.conf"]
      interval: 10s
      timeout: 5s
      retries: 10

  mediamtx:
    image: ${VEZOR_MEDIAMTX_IMAGE:?set VEZOR_MEDIAMTX_IMAGE}
    container_name: vezor-edge-mediamtx
    restart: unless-stopped
    ports:
      - "${VEZOR_EDGE_RTSP_BIND:-0.0.0.0}:8554:8554"
      - "${VEZOR_EDGE_HLS_BIND:-0.0.0.0}:8888:8888"
      - "${VEZOR_EDGE_WEBRTC_BIND:-0.0.0.0}:8889:8889"
      - "${VEZOR_EDGE_MEDIAMTX_API_BIND:-127.0.0.1}:9997:9997"
    volumes:
      - /etc/vezor/edge.json:/etc/vezor/edge.json:ro
      - /etc/vezor/mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - /var/lib/vezor/mediamtx:/data

  vezor-supervisor:
    image: ${VEZOR_SUPERVISOR_IMAGE:?set VEZOR_SUPERVISOR_IMAGE}
    container_name: vezor-supervisor
    restart: unless-stopped
    entrypoint: ["/app/.venv/bin/python", "-m", "argus.supervisor.runner"]
    command:
      - --config
      - /etc/vezor/supervisor.json
    environment:
      ARGUS_NATS_URL: ${ARGUS_NATS_URL:-nats://nats-leaf:4222}
      ARGUS_MEDIAMTX_API_URL: http://mediamtx:9997
      ARGUS_MEDIAMTX_RTSP_BASE_URL: rtsp://mediamtx:8554
      ARGUS_MEDIAMTX_WEBRTC_BASE_URL: http://mediamtx:8889
      ARGUS_MEDIAMTX_HLS_BASE_URL: http://mediamtx:8888
      ARGUS_MEDIAMTX_MJPEG_BASE_URL: http://mediamtx:8888
      ARGUS_MEDIAMTX_WHIP_BASE_URL: http://mediamtx:8889
      ARGUS_ENABLE_WORKER_METRICS_SERVER: "true"
      ARGUS_WORKER_METRICS_PORT: "9108"
      ARGUS_PUBLISH_PROFILE: jetson-nano
      ARGUS_JETSON_RTSP_PROTOCOLS: ${ARGUS_JETSON_RTSP_PROTOCOLS:-tcp}
      ARGUS_JETSON_RTSP_LATENCY_MS: ${ARGUS_JETSON_RTSP_LATENCY_MS:-200}
      ARGUS_JETSON_RTSP_DROP_ON_LATENCY: ${ARGUS_JETSON_RTSP_DROP_ON_LATENCY:-true}
      YOLO_CONFIG_DIR: /tmp
    ports:
      - "${VEZOR_WORKER_METRICS_BIND:-127.0.0.1}:9108:9108"
    volumes:
      - /etc/vezor/edge.json:/etc/vezor/edge.json:ro
      - /etc/vezor/supervisor.json:/etc/vezor/supervisor.json:ro
      - ${VEZOR_CREDENTIALS_HOST_DIR:-/var/lib/vezor/credentials}:/run/vezor/credentials:ro
      - ${VEZOR_MODEL_HOST_DIR:-/var/lib/vezor/models}:/models:ro
      - /var/lib/vezor:/var/lib/vezor
      - /var/log/vezor:/var/log/vezor
    depends_on:
      - nats-leaf
      - mediamtx
    runtime: ${VEZOR_NVIDIA_RUNTIME:-nvidia}
    device_cgroup_rules:
      - "c 195:* rmw"
      - "c 508:* rmw"
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-m", "argus.supervisor.runner", "--healthcheck", "--config", "/etc/vezor/supervisor.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
