services:
  vezor-supervisor:
    image: ghcr.io/vezor/supervisor:latest
    container_name: vezor-supervisor
    restart: unless-stopped
    command:
      - python
      - -m
      - argus.supervisor.runner
      - --config
      - /etc/vezor/supervisor.json
    volumes:
      - /etc/vezor/supervisor.json:/etc/vezor/supervisor.json:ro
      - /run/vezor/credentials:/run/vezor/credentials:ro
      - /var/lib/vezor:/var/lib/vezor
      - /var/log/vezor:/var/log/vezor
    healthcheck:
      test: ["CMD", "python", "-m", "argus.supervisor.runner", "--healthcheck", "--config", "/etc/vezor/supervisor.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
