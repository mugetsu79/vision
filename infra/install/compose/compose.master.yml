name: vezor-master

secrets:
  postgres_password:
    file: /etc/vezor/secrets/postgres_password
  backend_db_url:
    file: /etc/vezor/secrets/backend_db_url
  minio_root_user:
    file: /etc/vezor/secrets/minio_root_user
  minio_root_password:
    file: /etc/vezor/secrets/minio_root_password
  keycloak_admin_username:
    file: /etc/vezor/secrets/keycloak_admin_username
  keycloak_admin_password:
    file: /etc/vezor/secrets/keycloak_admin_password

services:
  postgres:
    image: ${VEZOR_POSTGRES_IMAGE:?set VEZOR_POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VEZOR_POSTGRES_DB:-argus}
      POSTGRES_USER: ${VEZOR_POSTGRES_USER:-argus}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    ports:
      - "${VEZOR_POSTGRES_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - /var/lib/vezor/postgres:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${VEZOR_REDIS_IMAGE:?set VEZOR_REDIS_IMAGE}
    restart: unless-stopped
    ports:
      - "${VEZOR_REDIS_BIND:-127.0.0.1}:6379:6379"
    volumes:
      - /var/lib/vezor/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: ${VEZOR_NATS_IMAGE:?set VEZOR_NATS_IMAGE}
    command: ["-js", "-c", "/etc/nats/nats.conf"]
    restart: unless-stopped
    ports:
      - "${VEZOR_NATS_BIND:-127.0.0.1}:4222:4222"
      - "${VEZOR_NATS_HTTP_BIND:-127.0.0.1}:8222:8222"
      - "${VEZOR_NATS_LEAF_BIND:-0.0.0.0}:7422:7422"
    volumes:
      - /etc/vezor/nats/nats.conf:/etc/nats/nats.conf:ro
      - /var/lib/vezor/nats:/data
    healthcheck:
      test: ["CMD", "/nats-server", "-t", "-c", "/etc/nats/nats.conf"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${VEZOR_MINIO_IMAGE:?set VEZOR_MINIO_IMAGE}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    ports:
      - "${VEZOR_MINIO_BIND:-127.0.0.1}:9000:9000"
      - "${VEZOR_MINIO_CONSOLE_BIND:-127.0.0.1}:9001:9001"
    volumes:
      - /var/lib/vezor/minio:/data
    secrets:
      - minio_root_user
      - minio_root_password
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: ${VEZOR_KEYCLOAK_IMAGE:?set VEZOR_KEYCLOAK_IMAGE}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export KC_BOOTSTRAP_ADMIN_USERNAME="$(cat /run/secrets/keycloak_admin_username)"
        export KC_BOOTSTRAP_ADMIN_PASSWORD="$(cat /run/secrets/keycloak_admin_password)"
        export KC_DB_PASSWORD="$(cat /run/secrets/postgres_password)"
        exec /opt/keycloak/bin/kc.sh start
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${VEZOR_POSTGRES_DB:-argus}
      KC_DB_USERNAME: ${VEZOR_POSTGRES_USER:-argus}
      KC_HTTP_ENABLED: ${VEZOR_KEYCLOAK_HTTP_ENABLED:-true}
      KC_HOSTNAME: ${VEZOR_KEYCLOAK_HOSTNAME:-localhost}
    ports:
      - "${VEZOR_KEYCLOAK_BIND:-127.0.0.1}:8080:8080"
    secrets:
      - keycloak_admin_username
      - keycloak_admin_password
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  mediamtx:
    image: ${VEZOR_MEDIAMTX_IMAGE:?set VEZOR_MEDIAMTX_IMAGE}
    restart: unless-stopped
    ports:
      - "${VEZOR_MEDIAMTX_RTSP_BIND:-0.0.0.0}:8554:8554"
      - "${VEZOR_MEDIAMTX_HLS_BIND:-0.0.0.0}:8888:8888"
      - "${VEZOR_MEDIAMTX_WEBRTC_BIND:-0.0.0.0}:8889:8889"
      - "${VEZOR_MEDIAMTX_API_BIND:-127.0.0.1}:9997:9997"
    volumes:
      - /etc/vezor/mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - /var/lib/vezor/mediamtx:/data

  backend:
    image: ${VEZOR_BACKEND_IMAGE:?set VEZOR_BACKEND_IMAGE}
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - /app/.venv/bin/alembic upgrade head && /app/.venv/bin/uvicorn argus.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ${VEZOR_MASTER_ENV_FILE:-/etc/vezor/master.env}
    environment:
      ARGUS_REDIS_URL: redis://redis:6379/0
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_MEDIAMTX_API_URL: http://mediamtx:9997
      ARGUS_MEDIAMTX_RTSP_BASE_URL: rtsp://mediamtx:8554
      ARGUS_MEDIAMTX_WEBRTC_BASE_URL: http://mediamtx:8889
      ARGUS_MEDIAMTX_HLS_BASE_URL: http://mediamtx:8888
      ARGUS_MEDIAMTX_MJPEG_BASE_URL: http://mediamtx:8888
      ARGUS_MEDIAMTX_WHIP_BASE_URL: http://mediamtx:8889
      ARGUS_MINIO_ENDPOINT: minio:9000
      ARGUS_MINIO_SECURE: "false"
      ARGUS_KEYCLOAK_SERVER_URL: http://keycloak:8080
      ARGUS_KEYCLOAK_PUBLIC_SERVER_URL: ${VEZOR_PUBLIC_KEYCLOAK_URL:-http://localhost:8080}
      ARGUS_KEYCLOAK_ISSUER: ${VEZOR_PUBLIC_OIDC_AUTHORITY:-http://localhost:8080/realms/argus-dev}
      ARGUS_KEYCLOAK_FRONTEND_CLIENT_ID: ${VEZOR_OIDC_CLIENT_ID:-argus-frontend}
      ARGUS_KEYCLOAK_FRONTEND_URL: ${VEZOR_PUBLIC_FRONTEND_URL:-http://localhost:3000}
    ports:
      - "${VEZOR_API_BIND:-0.0.0.0}:8000:8000"
    volumes:
      - /etc/vezor/master.json:/etc/vezor/master.json:ro
      - /var/lib/vezor/models:/models:ro
      - /var/lib/vezor/evidence:/var/lib/vezor/evidence
      - /var/log/vezor/backend:/var/log/vezor/backend
    secrets:
      - source: backend_db_url
        target: ARGUS_DB_URL
      - source: minio_root_user
        target: ARGUS_MINIO_ACCESS_KEY
      - source: minio_root_password
        target: ARGUS_MINIO_SECRET_KEY
      - source: keycloak_admin_username
        target: ARGUS_KEYCLOAK_ADMIN_USERNAME
      - source: keycloak_admin_password
        target: ARGUS_KEYCLOAK_ADMIN_PASSWORD
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mediamtx:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: ${VEZOR_FRONTEND_IMAGE:?set VEZOR_FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VEZOR_PUBLIC_API_BASE_URL:-http://localhost:8000}
      VITE_OIDC_AUTHORITY: ${VEZOR_PUBLIC_OIDC_AUTHORITY:-http://localhost:8080/realms/argus-dev}
      VITE_OIDC_CLIENT_ID: ${VEZOR_OIDC_CLIENT_ID:-argus-frontend}
      VITE_OIDC_REDIRECT_URI: ${VEZOR_PUBLIC_FRONTEND_URL:-http://localhost:3000}/auth/callback
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${VEZOR_PUBLIC_FRONTEND_URL:-http://localhost:3000}/signin
    ports:
      - "${VEZOR_FRONTEND_BIND:-0.0.0.0}:3000:8080"
    depends_on:
      backend:
        condition: service_healthy

  vezor-supervisor:
    image: ${VEZOR_SUPERVISOR_IMAGE:?set VEZOR_SUPERVISOR_IMAGE}
    restart: unless-stopped
    command:
      - /app/.venv/bin/python
      - -m
      - argus.supervisor.runner
      - --config
      - /etc/vezor/supervisor.json
    volumes:
      - /etc/vezor/supervisor.json:/etc/vezor/supervisor.json:ro
      - ${VEZOR_CREDENTIALS_HOST_DIR:-/var/lib/vezor/credentials}:/run/vezor/credentials:ro
      - /var/lib/vezor:/var/lib/vezor
      - /var/log/vezor:/var/log/vezor
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-m", "argus.supervisor.runner", "--healthcheck", "--config", "/etc/vezor/supervisor.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
