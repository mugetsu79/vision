services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10
    command: ["-js", "-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
      - "7422:7422"
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: argus
      MINIO_ROOT_PASSWORD: argus-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "9997:9997"
      - "9998:9998"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol-contrib/config.yaml:ro

  prometheus:
    image: prom/prometheus:v3.4.2
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.7.2
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  backend:
    image: python:3.12-slim
    working_dir: /workspace/backend
    command:
      - /bin/sh
      - -lc
      - >
        python -m pip install uv &&
        python -m uv sync --group runtime --group dev --group llm --group model-metadata &&
        python -m uv run uvicorn argus.main:app --reload --reload-dir src --host 0.0.0.0 --port 8000
    environment:
      PYTHONPATH: /workspace/backend/src
      UV_PROJECT_ENVIRONMENT: /tmp/argus-backend-venv
      ARGUS_DB_URL: postgresql+asyncpg://argus:argus@postgres:5432/argus
      ARGUS_REDIS_URL: redis://redis:6379/0
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_OTLP_ENDPOINT: http://otel-collector:4318
      ARGUS_MEDIAMTX_API_URL: http://mediamtx:9997
      ARGUS_MEDIAMTX_RTSP_BASE_URL: rtsp://mediamtx:8554
      ARGUS_MEDIAMTX_WEBRTC_BASE_URL: http://mediamtx:8889
      ARGUS_MEDIAMTX_HLS_BASE_URL: http://mediamtx:8888
      ARGUS_MEDIAMTX_MJPEG_BASE_URL: http://mediamtx:8888
      ARGUS_MEDIAMTX_WHIP_BASE_URL: http://mediamtx:8889
      ARGUS_MINIO_ENDPOINT: minio:9000
      ARGUS_MINIO_ACCESS_KEY: argus
      ARGUS_MINIO_SECRET_KEY: argus-dev-secret
      ARGUS_MINIO_SECURE: "false"
      ARGUS_MINIO_INCIDENTS_BUCKET: incidents
      ARGUS_KEYCLOAK_SERVER_URL: http://keycloak:8080
      ARGUS_KEYCLOAK_PUBLIC_SERVER_URL: http://127.0.0.1:8080
      ARGUS_KEYCLOAK_ISSUER: http://keycloak:8080/realms/argus-dev
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/workspace/backend
      - ${PWD}/models:${PWD}/models:ro
    depends_on:
      - minio
      - postgres
      - redis
      - nats

  frontend:
    image: node:22-bookworm-slim
    working_dir: /workspace/frontend
    command:
      - /bin/sh
      - -lc
      - >
        corepack enable &&
        pnpm install --force &&
        pnpm dev --host 0.0.0.0 --port 3000
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_OIDC_AUTHORITY: http://localhost:8080/realms/argus-dev
      VITE_OIDC_CLIENT_ID: argus-frontend
      VITE_OIDC_REDIRECT_URI: http://localhost:3000/auth/callback
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3000/signin
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/workspace/frontend
    depends_on:
      - backend
      - prometheus
      - loki
      - tempo
      - alertmanager

volumes:
  postgres-data:
  minio-data:
