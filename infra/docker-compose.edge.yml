services:
  inference-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.edge
      args:
        JETSON_ORT_WHEEL_URL: ${JETSON_ORT_WHEEL_URL:-}
    image: ghcr.io/mugetsu79/vision/argus-edge:${ARGUS_EDGE_TAG:-local}
    command: ["--camera-id", "${ARGUS_EDGE_CAMERA_ID:?Set ARGUS_EDGE_CAMERA_ID to the camera id assigned to this edge worker}"]
    environment:
      ARGUS_API_BASE_URL: "${ARGUS_API_BASE_URL:?Set ARGUS_API_BASE_URL to the iMac/master API URL, for example http://192.168.1.20:8000}"
      ARGUS_API_BEARER_TOKEN: "${ARGUS_API_BEARER_TOKEN:?Set ARGUS_API_BEARER_TOKEN to a fresh access token for the master API}"
      ARGUS_DB_URL: "${ARGUS_DB_URL:?Set ARGUS_DB_URL to the iMac/master Postgres URL, for example postgresql+asyncpg://argus:argus@192.168.1.20:5432/argus}"
      ARGUS_NATS_URL: "${ARGUS_NATS_URL:?Set ARGUS_NATS_URL to the master NATS URL, for example nats://192.168.1.20:4222}"
      ARGUS_MEDIAMTX_API_URL: http://mediamtx:9997
      ARGUS_MEDIAMTX_RTSP_BASE_URL: rtsp://mediamtx:8554
      ARGUS_MEDIAMTX_WHIP_BASE_URL: http://mediamtx:8889
      ARGUS_MINIO_ENDPOINT: "${ARGUS_MINIO_ENDPOINT:?Set ARGUS_MINIO_ENDPOINT to the iMac/master MinIO endpoint, for example 192.168.1.20:9000}"
      ARGUS_MINIO_ACCESS_KEY: ${ARGUS_MINIO_ACCESS_KEY:-argus}
      ARGUS_MINIO_SECRET_KEY: ${ARGUS_MINIO_SECRET_KEY:-argus-dev-secret}
      ARGUS_MINIO_SECURE: ${ARGUS_MINIO_SECURE:-false}
      ARGUS_MINIO_INCIDENTS_BUCKET: ${ARGUS_MINIO_INCIDENTS_BUCKET:-incidents}
      ARGUS_OTLP_ENDPOINT: http://otel-collector:4318
      ARGUS_ENABLE_WORKER_METRICS_SERVER: "true"
      ARGUS_WORKER_METRICS_PORT: "9108"
      ARGUS_PUBLISH_PROFILE: jetson-nano
      ARGUS_JETSON_RTSP_PROTOCOLS: ${ARGUS_JETSON_RTSP_PROTOCOLS:-tcp}
      ARGUS_JETSON_RTSP_LATENCY_MS: ${ARGUS_JETSON_RTSP_LATENCY_MS:-200}
      ARGUS_JETSON_RTSP_DROP_ON_LATENCY: ${ARGUS_JETSON_RTSP_DROP_ON_LATENCY:-true}
      YOLO_CONFIG_DIR: /tmp
    ports:
      - "9108:9108"
    volumes:
      - ../models:/models:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mediamtx
      - nats-leaf
      - otel-collector
    runtime: nvidia
    device_cgroup_rules:
      - "c 195:* rmw"
      - "c 508:* rmw"

  supervisor:
    profiles: ["supervisor"]
    build:
      context: ../backend
      dockerfile: Dockerfile.edge
      args:
        JETSON_ORT_WHEEL_URL: ${JETSON_ORT_WHEEL_URL:-}
    image: ghcr.io/mugetsu79/vision/argus-edge:${ARGUS_EDGE_TAG:-local}
    entrypoint: ["/app/.venv/bin/python", "-m", "argus.supervisor.runner"]
    command:
      - --supervisor-id
      - ${ARGUS_SUPERVISOR_ID:?Set ARGUS_SUPERVISOR_ID}
      - --role
      - edge
      - --edge-node-id
      - ${ARGUS_EDGE_NODE_ID:?Set ARGUS_EDGE_NODE_ID}
      - --api-base-url
      - ${ARGUS_API_BASE_URL:?Set ARGUS_API_BASE_URL}
      - --worker-metrics-url
      - http://127.0.0.1:9108/metrics
    environment:
      ARGUS_API_BASE_URL: "${ARGUS_API_BASE_URL:?Set ARGUS_API_BASE_URL to the iMac/master API URL, for example http://192.168.1.20:8000}"
      ARGUS_API_BEARER_TOKEN: "${ARGUS_API_BEARER_TOKEN:?Set ARGUS_API_BEARER_TOKEN to a fresh access token for the master API}"
      ARGUS_DB_URL: "${ARGUS_DB_URL:?Set ARGUS_DB_URL to the iMac/master Postgres URL, for example postgresql+asyncpg://argus:argus@192.168.1.20:5432/argus}"
      ARGUS_NATS_URL: "${ARGUS_NATS_URL:?Set ARGUS_NATS_URL to the master NATS URL, for example nats://192.168.1.20:4222}"
      ARGUS_MEDIAMTX_API_URL: http://mediamtx:9997
      ARGUS_MEDIAMTX_RTSP_BASE_URL: rtsp://mediamtx:8554
      ARGUS_MEDIAMTX_WHIP_BASE_URL: http://mediamtx:8889
      ARGUS_MINIO_ENDPOINT: "${ARGUS_MINIO_ENDPOINT:?Set ARGUS_MINIO_ENDPOINT to the iMac/master MinIO endpoint, for example 192.168.1.20:9000}"
      ARGUS_MINIO_ACCESS_KEY: ${ARGUS_MINIO_ACCESS_KEY:-argus}
      ARGUS_MINIO_SECRET_KEY: ${ARGUS_MINIO_SECRET_KEY:-argus-dev-secret}
      ARGUS_MINIO_SECURE: ${ARGUS_MINIO_SECURE:-false}
      ARGUS_MINIO_INCIDENTS_BUCKET: ${ARGUS_MINIO_INCIDENTS_BUCKET:-incidents}
      ARGUS_OTLP_ENDPOINT: http://otel-collector:4318
      ARGUS_ENABLE_WORKER_METRICS_SERVER: "true"
      ARGUS_WORKER_METRICS_PORT: "9108"
      ARGUS_PUBLISH_PROFILE: jetson-nano
      ARGUS_JETSON_RTSP_PROTOCOLS: ${ARGUS_JETSON_RTSP_PROTOCOLS:-tcp}
      ARGUS_JETSON_RTSP_LATENCY_MS: ${ARGUS_JETSON_RTSP_LATENCY_MS:-200}
      ARGUS_JETSON_RTSP_DROP_ON_LATENCY: ${ARGUS_JETSON_RTSP_DROP_ON_LATENCY:-true}
      YOLO_CONFIG_DIR: /tmp
    ports:
      - "9108:9108"
    volumes:
      - ../models:/models:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mediamtx
      - nats-leaf
      - otel-collector
    runtime: nvidia
    device_cgroup_rules:
      - "c 195:* rmw"
      - "c 508:* rmw"

  mediamtx:
    image: bluenviron/mediamtx:latest
    environment:
      MTX_AUTHJWTJWKS: ${ARGUS_API_BASE_URL:?Set ARGUS_API_BASE_URL to the iMac/master API URL}/.well-known/argus/mediamtx/jwks.json
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "9997:9997"
      - "9998:9998"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro

  nats-leaf:
    image: nats:2.10
    command: ["-js", "-c", "/etc/nats/nats.conf"]
    ports:
      - "4223:4222"
      - "8223:8222"
    volumes:
      - ./nats/leaf.conf:/etc/nats/nats.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol-contrib/config.yaml:ro
