{{- if .Values.central.enabled }}
{{- if and .Values.central.backend.reflector.enabled (not .Values.central.backend.reflector.secretName) }}
{{- fail "central.backend.reflector.secretName is required when central.backend.reflector.enabled=true" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argus.fullname" . }}-backend
  labels:
    {{- include "argus.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.central.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "argus.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: {{ include "argus.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.central.backend.image.repository "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - containerPort: {{ .Values.central.backend.service.port }}
              name: http
            {{- if .Values.central.backend.reflector.enabled }}
            - containerPort: {{ .Values.central.backend.reflector.port }}
              name: link-reflector
              protocol: UDP
            {{- end }}
          env:
            - name: ARGUS_OTLP_ENDPOINT
              value: http://{{ include "argus.fullname" . }}-otel-collector:4318
            - name: ARGUS_MEDIAMTX_API_URL
              value: http://{{ include "argus.fullname" . }}-mediamtx:9997
            - name: ARGUS_MEDIAMTX_RTSP_BASE_URL
              value: rtsp://{{ include "argus.fullname" . }}-mediamtx:8554
            - name: ARGUS_MEDIAMTX_WHIP_BASE_URL
              value: http://{{ include "argus.fullname" . }}-mediamtx:8889
            - name: ARGUS_LINK_REFLECTOR_ENABLED
              value: {{ .Values.central.backend.reflector.enabled | quote }}
            - name: ARGUS_LINK_REFLECTOR_BIND_ADDRESS
              value: {{ .Values.central.backend.reflector.bindAddress | quote }}
            - name: ARGUS_LINK_REFLECTOR_PUBLIC_ADDRESS
              value: {{ .Values.central.backend.reflector.publicAddress | quote }}
            - name: ARGUS_LINK_REFLECTOR_PORT
              value: {{ .Values.central.backend.reflector.port | quote }}
            - name: ARGUS_LINK_REFLECTOR_KEY_ID
              value: {{ .Values.central.backend.reflector.keyId | quote }}
            - name: ARGUS_LINK_REFLECTOR_RATE_LIMIT_PPS
              value: {{ .Values.central.backend.reflector.rateLimitPps | quote }}
            - name: ARGUS_LINK_REFLECTOR_ALLOWED_SOURCE_CIDRS
              value: {{ .Values.central.backend.reflector.allowedSourceCidrs | quote }}
            {{- if .Values.central.backend.reflector.secretName }}
            - name: ARGUS_LINK_REFLECTOR_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.central.backend.reflector.secretName | quote }}
                  key: {{ .Values.central.backend.reflector.secretKey | quote }}
            {{- end }}
            {{- range $name, $value := .Values.central.backend.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.central.backend.resources | nindent 12 }}
{{- end }}
