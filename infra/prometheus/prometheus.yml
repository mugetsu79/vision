global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
  - job_name: mediamtx
    metrics_path: /metrics
    static_configs:
      - targets: ["mediamtx:9998"]
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]
