<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="48 48 416 416" role="img" aria-label="Vezor symbol">
  <title>Vezor symbol</title>
  <desc>Standalone OmniSight eye mark with faceted cerulean-to-violet shards on a transparent background.</desc>
  <defs>
    <linearGradient id="beamGradient" x1="86" y1="86" x2="426" y2="426" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78d8ff"/>
      <stop offset="0.52" stop-color="#5b74ff"/>
      <stop offset="1" stop-color="#8e45ff"/>
    </linearGradient>
    <linearGradient id="shardLit" x1="256" y1="76" x2="256" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e3f7ff"/>
      <stop offset="0.42" stop-color="#75b7ff"/>
      <stop offset="1" stop-color="#3657e7"/>
    </linearGradient>
    <linearGradient id="shardShade" x1="256" y1="76" x2="256" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9158ff"/>
      <stop offset="0.62" stop-color="#5830d8"/>
      <stop offset="1" stop-color="#2a106e"/>
    </linearGradient>
    <radialGradient id="irisGradient" cx="244" cy="238" r="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.22" stop-color="#dff6ff"/>
      <stop offset="0.5" stop-color="#42c9ff"/>
      <stop offset="0.78" stop-color="#335dff"/>
      <stop offset="1" stop-color="#5d24ce"/>
    </radialGradient>
    <filter id="symbolGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <symbol id="shard" overflow="visible">
      <path d="M0 -174 L0 -54 L-18 -110 Z" fill="url(#shardLit)"/>
      <path d="M0 -174 L0 -54 L18 -110 Z" fill="url(#shardShade)"/>
      <path d="M0 -174 L-18 -110" fill="none" stroke="#ecf8ff" stroke-linecap="round" stroke-opacity="0.82" stroke-width="1.6"/>
      <path d="M0 -166 L0 -58" fill="none" stroke="#cbd8ff" stroke-linecap="round" stroke-opacity="0.55" stroke-width="0.9"/>
    </symbol>
  </defs>
  <g id="vezor-symbol-core" transform="translate(256 256)">
    <g id="symbol-shards" filter="url(#symbolGlow)">
      <g transform="rotate(15)"><use href="#shard"/></g>
      <g transform="rotate(75)"><use href="#shard"/></g>
      <g transform="rotate(135)"><use href="#shard"/></g>
      <g transform="rotate(195)"><use href="#shard"/></g>
      <g transform="rotate(255)"><use href="#shard"/></g>
      <g transform="rotate(315)"><use href="#shard"/></g>
    </g>
    <g id="symbol-eye" fill="none" stroke-linecap="round" filter="url(#symbolGlow)">
      <path d="M-132 0 Q0 -105 132 0" stroke="#1b164d" stroke-opacity="0.66" stroke-width="12"/>
      <path d="M-132 0 Q0 105 132 0" stroke="#1b164d" stroke-opacity="0.66" stroke-width="12"/>
      <path d="M-124 0 Q0 -96 124 0" stroke="url(#beamGradient)" stroke-width="8"/>
      <path d="M-124 0 Q0 96 124 0" stroke="url(#beamGradient)" stroke-width="8"/>
      <path d="M-100 -2 Q0 -78 100 -2" stroke="#eef8ff" stroke-opacity="0.44" stroke-width="2"/>
      <path d="M-100 2 Q0 78 100 2" stroke="#eef8ff" stroke-opacity="0.36" stroke-width="2"/>
    </g>
    <g filter="url(#symbolGlow)">
      <circle cx="0" cy="0" r="45" fill="url(#irisGradient)"/>
      <circle cx="0" cy="0" r="17" fill="#050712"/>
      <circle cx="-9" cy="-12" r="5" fill="#ffffff" opacity="0.88"/>
    </g>
  </g>
</svg>
